<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shivam 🎂</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  text-align:center;
  overflow:hidden;
}

h1 {
  margin-top:20px;
  font-size:40px;
  color:#ff2e63;
}

#countdown {
  font-size:28px;
  margin:20px;
}

.cake {
  margin:50px auto;
  width:200px;
  height:200px;
  position:relative;
}

.layer {
  width:200px;
  height:60px;
  background:#ff6f61;
  border-radius:10px;
  margin-top:5px;
}

.candle {
  width:10px;
  height:40px;
  background:#fff;
  position:absolute;
  top:-40px;
  left:95px;
}

.flame {
  width:12px;
  height:20px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-20px;
  left:-1px;
  animation:flicker 0.5s infinite;
}

@keyframes flicker {
  0%{transform:scale(1);} 
  50%{transform:scale(1.2);} 
  100%{transform:scale(1);} 
}

button {
  padding:10px 20px;
  font-size:16px;
  background:#ff2e63;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.confetti {
  position:absolute;
  width:8px;
  height:8px;
  background:yellow;
  top:-10px;
  animation:fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

</style>
</head>
<body>

<h1>🎉 Happy Birthday Shivam 🎉</h1>

<div id="countdown"></div>

<div class="cake">
  <div class="candle" id="candle">
    <div class="flame" id="flame"></div>
  </div>
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="layer"></div>
</div>

<button onclick="blowCandles()">Blow Candle 🎂</button>

<h2 id="wish" style="display:none; color:#fff;">✨ Happy Birthday Shivam! 🎉💖</h2>

<script>
// Countdown
const birthday = new Date("May 17, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = birthday - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerHTML = 
    `${d}d ${h}h ${m}m ${s}s`;
},1000);

// Blow candle
function blowCandles(){
  document.getElementById("flame").style.display = "none";
  document.getElementById("wish").style.display = "block";
  createConfetti();
}

// Confetti
function createConfetti(){
  for(let i=0;i<100;i++){
    const c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDuration = (2+Math.random()*3)+"s";
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
